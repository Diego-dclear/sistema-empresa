pronto, adicionei esse codigo, agr preciso q vc finalize tudo de uma vez pq meu lumete de mensagem diaria vai acabar                                                              <!DOCTYPE html> 
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sistema Empresa</title>

<style>
body { background:#000; color:#fff; font-family:Arial; margin:0; }
header { background:red; padding:10px; text-align:center; }
.abas { display:flex; background:#111; }
.aba { padding:10px; cursor:pointer; }
.ativa { border-bottom:2px solid red; }
.conteudo { padding:20px; }
.item { background:#222; margin:10px 0; padding:10px; }
.alerta { color:red; animation: pisca 1s infinite; }
@keyframes pisca { 50% { opacity:0; } }
</style>

</head>
<body>

<header>
Sistema de Vendas e Estoque<br>
<span id="relogio"></span>
</header>

<div class="abas">
<div class="aba ativa">Anotações</div>
<div class="aba">Vendas</div>
<div class="aba">Estoque</div>
<div class="aba">Reposição</div>
<div class="aba">Financeiro</div>
</div>

<div class="conteudo" id="conteudo"></div>

<script>

// ================= DADOS =================
let comandas = JSON.parse(localStorage.getItem("comandas")) || [];
let vendas = JSON.parse(localStorage.getItem("vendas")) || [];

let estoque = JSON.parse(localStorage.getItem("estoque")) || [
  {nome:"Coca", preco:5, qtd:10, min:3},
  {nome:"Salgado", preco:7, qtd:10, min:3}
];

// ================= SALVAR =================
function salvar(){
  localStorage.setItem("comandas", JSON.stringify(comandas));
  localStorage.setItem("vendas", JSON.stringify(vendas));
  localStorage.setItem("estoque", JSON.stringify(estoque));
}

// ================= RELÓGIO =================
function atualizarRelogio(){
  document.getElementById("relogio").innerText =
    new Date().toLocaleString("pt-BR");
}
setInterval(atualizarRelogio,1000);

// ================= ABAS =================
const abas = document.querySelectorAll(".aba");
const conteudo = document.getElementById("conteudo");

abas.forEach((aba,i)=>{
  aba.onclick=()=>{
    abas.forEach(a=>a.classList.remove("ativa"));
    aba.classList.add("ativa");

    if(i===0) renderComandas();
    if(i===1) renderVendas();
    if(i===2) renderEstoque();
    if(i===3) renderReposicao();
    if(i===4) renderFinanceiro();
  }
});

// ================= ANOTAÇÕES =================
function renderComandas(){
  conteudo.innerHTML=`
  <h2>Anotações</h2>
  <input id="nome" placeholder="Cliente">
  <button onclick="novaComanda()">Criar</button>
  <div id="lista"></div>
  `;

  const lista=document.getElementById("lista");

  comandas.forEach((c,i)=>{
    let total=0;
    c.itens.forEach(p=> total+=p.preco);

    lista.innerHTML+=`
    <div class="item">
    <b>${c.nome}</b><br>
    Total: R$ ${total.toFixed(2)}<br><br>

    <select id="prod${i}">
      ${estoque.map(p=>`<option>${p.nome}</option>`).join("")}
    </select>
    <button onclick="addProduto(${i})">Adicionar</button>

    <div>
      ${c.itens.map(p=>`${p.nome} - R$${p.preco}`).join("<br>")}
    </div>

    <button onclick="finalizar(${i})">Finalizar</button>
    </div>
    `;
  });
}

function novaComanda(){
  const nome=document.getElementById("nome").value;
  if(!nome) return;

  comandas.push({nome,itens:[]});
  salvar();
  renderComandas();
}

function addProduto(i){
  const select=document.getElementById("prod"+i);
  const prod=estoque.find(p=>p.nome===select.value);

  if(prod.qtd<=0){
    alert("Sem estoque!");
    return;
  }

  comandas[i].itens.push({nome:prod.nome,preco:prod.preco});
  prod.qtd--;

  salvar();
  renderComandas();
}

function finalizar(i){
  vendas.push({
    ...comandas[i],
    data:new Date().toLocaleString("pt-BR")
  });

  comandas.splice(i,1);
  salvar();
  renderComandas();
}

// ================= VENDAS =================
function renderVendas(){
  conteudo.innerHTML="<h2>Vendas</h2>";

  vendas.forEach(v=>{
    let total=0;
    v.itens.forEach(p=> total+=p.preco);

    conteudo.innerHTML+=`
    <div class="item">
    ${v.nome}<br>
    ${v.itens.map(p=>p.nome).join(", ")}<br>
    Total: R$ ${total.toFixed(2)}<br>
    ${v.data}
    </div>
    `;
  });
}

// ================= ESTOQUE =================
function renderEstoque(){
  conteudo.innerHTML="<h2>Estoque</h2>";

  estoque.forEach(p=>{
    conteudo.innerHTML+=`
    <div class="item ${p.qtd<=p.min ? "alerta":""}">
    ${p.nome} | Qtd: ${p.qtd}
    </div>
    `;
  });
}

// ================= REPOSIÇÃO =================
function renderReposicao(){
  conteudo.innerHTML="<h2>Reposição</h2>";

  const baixos = estoque.filter(p => p.qtd <= p.min);

  if(baixos.length === 0){
    conteudo.innerHTML += "<p>Estoque OK</p>";
    return;
  }

  baixos.forEach(p=>{
    conteudo.innerHTML += `
    <div class="item alerta">
      ${p.nome} precisa reposição
    </div>
    `;
  });
}

// ================= FINANCEIRO =================
function renderFinanceiro(){
  conteudo.innerHTML="<h2>Financeiro</h2>";

  let total=0;

  vendas.forEach(v=>{
    v.itens.forEach(p=>{
      total+=p.preco;
    });
  });

  conteudo.innerHTML+=`
  <div class="item">
    Total: R$ ${total.toFixed(2)}
  </div>
  `;
}

// ================= INICIAR =================
renderComandas();

</script>

</body>
</html>
