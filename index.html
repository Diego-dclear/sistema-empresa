<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Sistema Empresa</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: black;
      color: white;
    }

    header {
      background-color: red;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .abas {
      display: flex;
      background: #111;
    }

    .aba {
      padding: 10px 20px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }

    .aba:hover {
      background: #222;
    }

    .ativa {
      border-bottom: 2px solid red;
    }

    .conteudo {
      padding: 20px;
    }
  </style>
</head>

<body>

<header>
  Sistema de Vendas e Estoque
</header>

<div class="abas">
  <div class="aba ativa">Anotações</div>
  <div class="aba">Vendas</div>
  <div class="aba">Estoque</div>
  <div class="aba">Financeiro</div>
</div>

<div class="conteudo">
  <h2>Bem-vindo ao sistema</h2>
  <p>Primeira versão em construção...</p>
</div>
<script>
  const abas = document.querySelectorAll(".aba");

  abas.forEach((aba, index) => {
    aba.addEventListener("click", () => {

      // remove ativa de todas
      abas.forEach(a => a.classList.remove("ativa"));

      // ativa a clicada
      aba.classList.add("ativa");

      // muda o conteúdo
      const conteudo = document.querySelector(".conteudo");

   if (index === 0) {
  conteudo.innerHTML = `
    <h2>Anotações</h2>

    <input id="nomeCliente" placeholder="Nome do cliente" style="padding:5px;">
    <button onclick="criarCliente()">Criar</button>

    <div id="listaClientes" style="margin-top:20px;"></div>
  `;
}

      if (index === 1) {
        conteudo.innerHTML = "<h2>Vendas</h2><p>Histórico de vendas...</p>";
      }

      if (index === 2) {
        conteudo.innerHTML = "<h2>Estoque</h2><p>Controle de produtos...</p>";
      }

      if (index === 3) {
        conteudo.innerHTML = "<h2>Financeiro</h2><p>Área restrita...</p>";
      }

    });
  });
</script>
</body>
</html>
