<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Sistema Empresa</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: black;
      color: white;
    }

    header {
      background-color: red;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .abas {
      display: flex;
      background: #111;
    }

    .aba {
      padding: 10px 20px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }

    .aba:hover {
      background: #222;
    }

    .ativa {
      border-bottom: 2px solid red;
    }

    .conteudo {
      padding: 20px;
    }

    input {
      padding: 5px;
    }

    button {
      padding: 5px 10px;
      cursor: pointer;
    }

    .item {
      margin-top: 10px;
      padding: 5px;
      background: #222;
    }
  </style>
</head>

<body>

  <header>
    Sistema de Vendas e Estoque
  </header>

  <div class="abas">
    <div class="aba ativa">Anotações</div>
    <div class="aba">Vendas</div>
    <div class="aba">Estoque</div>
    <div class="aba">Financeiro</div>
  </div>

  <div class="conteudo" id="conteudo">
    <h2>Anotações</h2>

    <input id="nomeCliente" placeholder="Nome do cliente">
    <button onclick="criarCliente()">Criar</button>

    <div id="listaClientes"></div>
  </div>

  <script>
    const abas = document.querySelectorAll(".aba");
    const conteudo = document.getElementById("conteudo");

    abas.forEach((aba, index) => {
      aba.addEventListener("click", () => {

        // remove ativa
        abas.forEach(a => a.classList.remove("ativa"));

        // ativa clicada
        aba.classList.add("ativa");

        // troca conteúdo
        if (index === 0) {
          conteudo.innerHTML = `
            <h2>Anotações</h2>
            <input id="nomeCliente" placeholder="Nome do cliente">
            <button onclick="criarCliente()">Criar</button>
            <div id="listaClientes"></div>
          `;
        }

        if (index === 1) {
          conteudo.innerHTML = `
            <h2>Vendas</h2>
            <p>Histórico de vendas...</p>
          `;
        }

        if (index === 2) {
          conteudo.innerHTML = `
            <h2>Estoque</h2>
            <p>Controle de produtos...</p>
          `;
        }

        if (index === 3) {
          conteudo.innerHTML = `
            <h2>Financeiro</h2>
            <p>Área restrita...</p>
          `;
        }

      });
    });

    function criarCliente() {
      const input = document.getElementById("nomeCliente");
      const lista = document.getElementById("listaClientes");

      if (input.value.trim() !== "") {
        const novo = document.createElement("div");
        novo.classList.add("item");
        novo.textContent = input.value;

        lista.appendChild(novo);
        input.value = "";
      }
    }
  </script>

</body>
</html>
